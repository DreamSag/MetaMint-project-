<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MetaMint | Withdraw</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Screen fitting fixes */
        body { overflow-x: hidden; width: 100%; touch-action: pan-y; }
        /* Input focus par auto-zoom rokne ke liye font size 16px fix kiya gaya hai */
        input, button { font-size: 16px !important; }
        .auth-form label { display: block; margin-bottom: 5px; margin-left: 5px; }
    </style>
</head>
<body class="dash-body">

    <header class="dash-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-arrow-left" onclick="window.location.href='dashboard.html'" style="cursor: pointer;"></i>
            <h2 style="color: #38bdf8;">Withdraw Funds</h2>
        </div>
    </header>

    <div style="padding: 20px; margin-bottom: 100px;">
        <div class="card main-card" style="text-align: center; margin-bottom: 20px; background: linear-gradient(135deg, #f59e0b, #d97706);">
            <p>Withdrawable Balance</p>
            <h2 id="drawBal">$0.00</h2>
        </div>

        <form id="withdrawForm" class="auth-form">
            <label style="color: #94a3b8; font-size: 0.8rem;">Amount to Withdraw</label>
            <input type="number" id="drawAmount" placeholder="Min $10" required>
            
            <label style="color: #94a3b8; font-size: 0.8rem;">USDT TRC20 Address</label>
            <input type="text" id="drawAddress" placeholder="Paste your wallet address" required>
            
            <button type="submit" class="main-btn" style="background: #f59e0b; color: white; border: none;">
                <i class="fas fa-paper-plane"></i> Submit Request
            </button>
        </form>

        <div style="background: rgba(245, 158, 11, 0.1); border: 1px dashed #f59e0b; padding: 15px; border-radius: 10px; margin-top: 25px;">
             <p style="font-size: 0.75rem; color: #fbbf24; text-align: center; line-height: 1.5;">
                <i class="fas fa-clock"></i> <b>Processing Time:</b> 24-48 hours.<br>
                Please ensure your TRC20 address is correct.
            </p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="plans.html" class="nav-item"><i class="fas fa-gem"></i><span>Plans</span></a>
        <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i><span>Deposit</span></a>
        <a href="team.html" class="nav-item"><i class="fas fa-users"></i><span>Team</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script type="module" src="withdraw.js"></script>
</body>
</html>
