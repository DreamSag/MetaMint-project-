<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMint | Join Now</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="logo-section">
            <h1 class="logo-text">Meta<span>Mint</span></h1>
            <p>Your Gateway to Passive Income</p>
        </div>

        <div class="auth-tabs">
            <button id="loginTab" class="active" onclick="showLogin()">Login</button>
            <button id="registerTab" onclick="showRegister()">Register</button>
        </div>

        <form id="loginForm" class="auth-form">
            <input type="email" id="loginEmail" placeholder="Email Address" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit" class="main-btn">Login to Dashboard</button>
        </form>

        <form id="registerForm" class="auth-form" style="display: none;">
            <input type="text" id="regUsername" placeholder="Full Name" required>
            <input type="email" id="regEmail" placeholder="Gmail Address" required>
            <input type="tel" id="regWhatsApp" placeholder="WhatsApp Number" required>
            <input type="text" id="regCity" placeholder="City" required>
            <input type="password" id="regPass" placeholder="Strong Password" required>
            <input type="text" id="regReferral" placeholder="Referral ID (Optional)">
            
            <div class="terms-box" style="margin: 15px 0; font-size: 0.8rem; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="termsCheck" required>
                <span style="color: #94a3b8;">I agree to the <a href="#" style="color: #38bdf8; text-decoration: none;">Terms & Conditions</a></span>
            </div>
            
            <button type="submit" class="main-btn">Create Account</button>
        </form>
    </div>

    <script>
        // Tab Switching Logic
        window.showLogin = function() {
            document.getElementById('loginForm').style.display = 'flex';
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginTab').classList.add('active');
            document.getElementById('registerTab').classList.remove('active');
        }

        window.showRegister = function() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'flex';
            document.getElementById('registerTab').classList.add('active');
            document.getElementById('loginTab').classList.remove('active');
        }
    </script>

    <script type="module" src="auth.js"></script>

</body>
</html>
