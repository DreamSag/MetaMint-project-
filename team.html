<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMint | My Team & History</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .team-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85rem; }
        .team-table th { text-align: left; color: #94a3b8; padding: 10px; border-bottom: 1px solid #334155; }
        .team-table td { padding: 12px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); color: #fff; }
        .status-active { color: #22c55e; font-weight: bold; }
        .status-inactive { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body class="dash-body">

    <header class="dash-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-arrow-left" onclick="window.location.href='dashboard.html'" style="cursor: pointer;"></i>
            <h2 style="color: #38bdf8;">My Team & Rewards</h2>
        </div>
    </header>

    <div style="padding: 20px; margin-bottom: 120px;">
        
        <div class="card secondary-card" style="text-align: center; border: 1px solid #334155;">
            <p style="font-size: 0.85rem; color: #94a3b8;">Your Referral ID</p>
            <h1 id="myReferralCode" style="color: #38bdf8; font-size: 2.5rem; margin: 10px 0; letter-spacing: 2px;">----</h1>
            <button class="main-btn" onclick="copyReferral()" style="width: 100%; border:none;"><i class="fas fa-copy"></i> Copy Referral Link</button>
        </div>

        <div class="card secondary-card" style="margin-top: 20px; text-align: center; background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-left: 4px solid #38bdf8;">
            <p style="font-size: 0.85rem; color: #94a3b8;">Total Team Members</p>
            <h2 id="totalTeamCount" style="color: #fff; font-size: 2rem; margin: 5px 0;">0</h2>
        </div>

        <div style="background: rgba(34, 197, 94, 0.05); border: 1px dashed #22c55e; padding: 15px; border-radius: 12px; margin-top: 20px;">
            <h4 style="color: #22c55e; margin-bottom: 12px; font-size: 1rem;"><i class="fas fa-gift"></i> Rewards Guide</h4>
            <div style="font-size: 0.8rem; color: #cbd5e1; line-height: 1.8;">
                <div style="display: flex; justify-content: space-between;"><span>Plan 1 ($20):</span><span style="color: #22c55e;">20% Reward</span></div>
                <div style="display: flex; justify-content: space-between;"><span>Plan 2 ($60):</span><span style="color: #38bdf8;">25% Reward</span></div>
                <div style="display: flex; justify-content: space-between;"><span>Plan 3 ($120):</span><span style="color: #fbbf24;">30% Reward</span></div>
            </div>
        </div>

        <div class="card secondary-card" style="margin-top: 20px; text-align: center; border: 1px solid #22c55e; background: rgba(34, 197, 94, 0.1);">
            <p style="font-size: 0.85rem; color: #94a3b8;">Unclaimed Team Rewards</p>
            <h2 id="unclaimedReward" style="color: #22c55e; font-size: 2.2rem; margin: 10px 0;">$0.00</h2>
            <button id="claimBtn" class="main-btn" style="background: #22c55e; width: 100%; border:none;"><i class="fas fa-wallet"></i> Claim to Balance</button>
        </div>

        <div class="card secondary-card" style="margin-top: 25px; padding: 15px;">
            <h3 style="color: #fff; font-size: 1.1rem; margin-bottom: 15px; display: flex; align-items: center; gap: 10px;">
                <i class="fas fa-users-cog" style="color: #38bdf8;"></i> Team History
            </h3>
            <div style="overflow-x: auto;">
                <table class="team-table">
                    <thead>
                        <tr>
                            <th>User ID</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="teamListBody">
                        <tr><td colspan="2" style="text-align: center; color: #64748b; padding: 20px;">Loading team...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="plans.html" class="nav-item"><i class="fas fa-gem"></i><span>Plans</span></a>
        <a href="team.html" class="nav-item active"><i class="fas fa-users"></i><span>Team</span></a>
        <a href="history.html" class="nav-item"><i class="fas fa-history"></i><span>History</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { auth, db } from './config.js';
        import { ref, onValue, update, get, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        auth.onAuthStateChanged((user) => {
            if (user) {
                const userRef = ref(db, 'users/' + user.uid);
                
                onValue(userRef, (snapshot) => {
                    const data = snapshot.val();
                    if(data) {
                        const myID = data.uid || '----';
                        document.getElementById('myReferralCode').innerText = myID;
                        document.getElementById('unclaimedReward').innerText = `$${(data.teamRewards || 0).toFixed(2)}`;
                        fetchTeamMembers(myID);
                    }
                });

                async function fetchTeamMembers(referrerID) {
                    const usersRef = ref(db, 'users');
                    const teamQuery = query(usersRef, orderByChild('referredBy'), equalTo(referrerID.toString()));
                    
                    onValue(teamQuery, (snapshot) => {
                        const teamListBody = document.getElementById('teamListBody');
                        const countDisplay = document.getElementById('totalTeamCount');
                        teamListBody.innerHTML = '';
                        
                        let totalCount = 0;
                        if (snapshot.exists()) {
                            snapshot.forEach((childSnapshot) => {
                                totalCount++;
                                const member = childSnapshot.val();
                                const statusClass = member.planActive ? 'status-active' : 'status-inactive';
                                const statusText = member.planActive ? 'Active' : 'Inactive';
                                
                                teamListBody.innerHTML += `
                                    <tr>
                                        <td>ID: ${member.uid}</td>
                                        <td class="${statusClass}">${statusText}</td>
                                    </tr>
                                `;
                            });
                            countDisplay.innerText = totalCount;
                        } else {
                            countDisplay.innerText = "0";
                            teamListBody.innerHTML = '<tr><td colspan="2" style="text-align:center; color:#64748b;">No members joined yet.</td></tr>';
                        }
                    });
                }

                document.getElementById('claimBtn').onclick = async () => {
                    const snap = await get(userRef);
                    const userData = snap.val();
                    const reward = userData.teamRewards || 0;
                    if (reward > 0) {
                        const newBalance = (userData.totalBalance || 0) + reward;
                        await update(userRef, { totalBalance: newBalance, teamRewards: 0 });
                        Swal.fire({ title: 'Success!', text: `$${reward.toFixed(2)} claimed.`, icon: 'success', background: '#0f172a', color: '#fff' });
                    } else {
                        Swal.fire({ title: 'Zero Balance', text: 'Nothing to claim.', icon: 'info', background: '#0f172a', color: '#fff' });
                    }
                };
            }
        });

        window.copyReferral = function() {
            const code = document.getElementById('myReferralCode').innerText;
            const link = window.location.origin + "/index.html?ref=" + code;
            navigator.clipboard.writeText(link).then(() => {
                Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Copied!', showConfirmButton: false, timer: 1500 });
            });
        }
    </script>
</body>
</html>
