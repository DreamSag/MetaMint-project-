<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MetaMint | History</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="dash-body">

    <header class="dash-header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <i class="fas fa-arrow-left" onclick="history.back()" style="cursor: pointer;"></i>
            <h2 style="color: #38bdf8;">Transaction History</h2>
        </div>
    </header>

    <div style="padding: 20px; margin-bottom: 80px;">
        <div style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px;">
            <button class="active-tab" style="padding: 8px 15px; border-radius: 20px; border: none; background: #38bdf8; color: #0f172a; font-weight: 600; white-space: nowrap;">All Records</button>
        </div>

        <div id="historyList">
            <p style="text-align: center; color: #94a3b8; margin-top: 50px;">Loading history...</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="plans.html" class="nav-item"><i class="fas fa-gem"></i><span>Plans</span></a>
        <a href="deposit.html" class="nav-item"><i class="fas fa-wallet"></i><span>Deposit</span></a>
        <a href="team.html" class="nav-item"><i class="fas fa-users"></i><span>Team</span></a>
        <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
    </nav>

    <script type="module">
        import { auth, db } from './config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const historyList = document.getElementById('historyList');
                
                // Fetching transactions from a common 'transactions' node
                onValue(ref(db, 'users/' + user.uid + '/transactions'), (snapshot) => {
                    let html = '';
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        Object.values(data).reverse().forEach(trx => {
                            let icon = trx.type === 'deposit' ? 'fa-arrow-down' : 'fa-arrow-up';
                            let color = trx.type === 'deposit' ? '#22c55e' : '#f87171';
                            if(trx.type === 'reward') { icon = 'fa-gift'; color = '#fbbf24'; }

                            html += `
                            <div class="card secondary-card" style="margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center;">
                                <div style="display: flex; align-items: center; gap: 15px;">
                                    <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; color: ${color};">
                                        <i class="fas ${icon}"></i>
                                    </div>
                                    <div>
                                        <h4 style="font-size: 0.9rem;">${trx.title}</h4>
                                        <p style="font-size: 0.7rem; color: #64748b;">${new Date(trx.timestamp).toLocaleString()}</p>
                                    </div>
                                </div>
                                <div style="text-align: right;">
                                    <h4 style="color: ${color}; font-size: 1rem;">${trx.type === 'withdraw' ? '-' : '+'}$${trx.amount}</h4>
                                    <p style="font-size: 0.6rem; color: #94a3b8;">${trx.status.toUpperCase()}</p>
                                </div>
                            </div>`;
                        });
                        historyList.innerHTML = html;
                    } else {
                        historyList.innerHTML = '<div style="text-align:center; margin-top:50px;"><i class="fas fa-folder-open" style="font-size:3rem; color:#1e293b;"></i><p style="color:#94a3b8; margin-top:10px;">No transactions yet</p></div>';
                    }
                });
            }
        });
    </script>
</body>
</html>
